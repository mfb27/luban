<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input { padding: 8px; width: 250px; }
        button { padding: 8px 16px; background: #3498db; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h2>管理员登录测试</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>邮箱:</label>
            <input type="email" id="email" value="admin@example.com" required>
        </div>
        <div class="form-group">
            <label>密码:</label>
            <input type="password" id="password" value="admin123" required>
        </div>
        <button type="submit">登录</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');

            result.innerHTML = '登录中...';

            try {
                const response = await fetch('http://localhost:8080/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.data && data.data.token) {
                    result.innerHTML = `
                        <h3 style="color: green;">登录成功！</h3>
                        <p>Token: ${data.data.token.substring(0, 50)}...</p>
                        <p>邮箱: ${data.data.admin.email}</p>
                        <p>ID: ${data.data.admin.id}</p>
                    `;
                    // 保存token
                    localStorage.setItem('admin_token', data.data.token);
                } else {
                    result.innerHTML = `<h3 style="color: red;">登录失败: ${data.message || '未知错误'}</h3>`;
                }
            } catch (err) {
                result.innerHTML = `<h3 style="color: red;">网络错误: ${err.message}</h3>`;
            }
        });
    </script>
</body>
</html>
